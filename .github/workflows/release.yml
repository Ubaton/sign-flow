name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build --workspace=signflow-core --workspace=signflow

      # On every push to main: if there are pending changesets, opens/updates
      # a "Version Packages" PR. Once that PR is merged (which contains no
      # more changesets), this step publishes the bumped packages to npm.
      - name: Version or publish
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npm run version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
